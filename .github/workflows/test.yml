name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Create virtual environment
        run: |
          python -m venv venv
      
      - name: Install dependencies
        run: |
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,yaml]"
          # Fix pytest-asyncio compatibility issue (0.23.3 broken with pytest 9.x)
          pip install pytest-asyncio==0.24.0
          # Verify pytest is installed
          python -c "import pytest; print(f'pytest version: {pytest.__version__}')"
      
      - name: Verify imports
        run: |
          . venv/bin/activate
          python -c "import bulletproof; print(f'Successfully imported bulletproof version: {bulletproof.__version__}')"
      
      - name: Lint with ruff
        run: |
          . venv/bin/activate
          ruff check .
      
      - name: Check formatting with ruff
        run: |
          . venv/bin/activate
          ruff format --check .
      
      - name: Test with pytest
        run: |
          . venv/bin/activate
          pytest -v --cov=bulletproof tests/ --asyncio-mode=auto
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
