name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install -e ".[dev,yaml,api]"
        # Ensure pip-audit is installed and available
        pip install pip-audit>=2.0.0

    - name: Lint with ruff
      run: |
        source venv/bin/activate
        ruff check .
        ruff format --check .

    - name: Run tests with pytest
      run: |
        source venv/bin/activate
        pytest -v --cov=bulletproof --cov-report=xml

    - name: Verify pip-audit installation
      run: |
        . venv/bin/activate
        python -m pip list | grep pip-audit
        which pip-audit || echo "pip-audit not in PATH"
        python -c "import pkg_resources; print(pkg_resources.get_distribution('pip-audit'))"
        # Try to run pip-audit as a module to verify it works
        python -m pip_audit --version || echo "pip-audit module not found"
    
    - name: Run pip-audit
      run: |
        . venv/bin/activate
        python -m pip_audit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
